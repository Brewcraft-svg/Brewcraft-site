<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--roast:#1E1C18;--roast-mid:#2C2A24;--cream:#F7F2E8;--cream-dk:#EDE6D6;--green:#3B6D11;--warm:#9A9588;--border:rgba(30,28,24,0.1);}
body{background:var(--cream);color:var(--roast);font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:rgba(247,242,232,0.96);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);}
.nav-logo{display:flex;align-items:center;text-decoration:none;}
.nav-logo svg{height:38px;width:auto;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links a{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--warm);text-decoration:none;padding:8px 14px;border-radius:2px;transition:color 0.2s;}
.nav-links a:hover{color:var(--roast);}
.nav-links a.active{color:var(--roast);}
.nav-cta{background:var(--green)!important;color:var(--cream)!important;border-radius:2px;}
.nav-cta:hover{background:var(--roast)!important;color:var(--cream)!important;}
.page-hero{padding:140px 48px 80px;border-bottom:0.5px solid var(--border);}
.page-tag{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);margin-bottom:16px;}
.page-tag::before{content:'';width:20px;height:1.5px;background:var(--green);}
.page-tag-light{color:rgba(247,242,232,0.4);}
.page-tag-light::before{background:rgba(247,242,232,0.4);}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,4.5vw,62px);font-weight:500;line-height:1.08;letter-spacing:-0.01em;margin-bottom:20px;}
h1 em{font-style:italic;color:var(--warm);}
.page-sub{font-size:17px;color:var(--warm);max-width:520px;line-height:1.75;}
.content{padding:80px 48px;}
.btn{display:inline-block;text-decoration:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;border-radius:2px;transition:all 0.2s;cursor:pointer;border:none;}
.btn-dark{background:var(--roast);color:var(--cream);padding:14px 32px;}
.btn-dark:hover{background:var(--roast-mid);transform:translateY(-1px);}
.btn-green{background:var(--green);color:var(--cream);padding:14px 32px;}
.btn-green:hover{background:#4a8a16;transform:translateY(-1px);}
.cta-band{background:var(--roast);padding:80px 48px;display:flex;align-items:center;justify-content:space-between;gap:48px;flex-wrap:wrap;}
.cta-band h2{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3vw,42px);font-weight:500;color:var(--cream);}
.cta-band h2 em{font-style:italic;opacity:0.55;}
footer{background:var(--roast);padding:44px 48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:32px;border-top:0.5px solid rgba(247,242,232,0.06);}
.footer-links{display:flex;gap:24px;list-style:none;justify-content:center;flex-wrap:wrap;}
.footer-links a{font-size:11px;color:rgba(247,242,232,0.28);text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;transition:color 0.2s;}
.footer-links a:hover{color:rgba(247,242,232,0.65);}
.footer-copy{font-size:11px;color:rgba(247,242,232,0.18);text-align:right;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.page-hero{animation:fadeUp 0.5s ease both;}
@media(max-width:960px){nav{padding:0 24px;}.nav-links li:not(:last-child){display:none;}.page-hero{padding:120px 24px 60px;}.content{padding:56px 24px;}.cta-band{padding:56px 24px;}footer{grid-template-columns:1fr;text-align:center;padding:36px 24px;}.footer-copy{text-align:center;}}
</style>
